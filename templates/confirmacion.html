<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita Agendada | Upperline Studio</title>
    <style>
        body { background: #0f0f10; color: #f5f5f5; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .card { background: #1b1b1c; padding: 30px; border-radius: 24px; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #D4AF37; }
        .btn-wa { display: inline-block; background: #25D366; color: white; text-decoration: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Cita Recibida!</h1>
        <p>Hola {{ cliente }}, para recibir tu comprobante oficial en WhatsApp y confirmar la cita, toca el botón de abajo:</p>
        
        <a href="{{ link_wa }}" class="btn-wa">
            📲 RECIBIR COMPROBANTE
        </a>
        
        <p style="margin-top: 30px;"><a href="/" style="color: #888;">Volver al inicio</a></p>

</html>
