<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita Agendada | Upperline Studio</title>
    <style>
        body {
            background: #0f0f10;
            color: #f5f5f5;
            font-family: sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }

        .card {
            background: #1b1b1c;
            padding: 30px;
            border-radius: 24px;
            max-width: 420px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: #D4AF37;
        }

        .btn-wa,
        .btn-cancelar {
            display: block;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 16px;
        }

        .btn-wa {
            background: #25D366;
            color: white;
        }

        .btn-cancelar {
            background: #2a2a2a;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
        }

        .volver {
            color: #888;
            display: inline-block;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Cita Recibida!</h1>
        <p>Hola {{ cliente }}, tu cita fue registrada correctamente.</p>
        <p>Desde aquí podés abrir WhatsApp o cancelar la cita si lo necesitás.</p>

        <a href="{{ link_wa }}" class="btn-wa">
            📲 Abrir WhatsApp
        </a>

        <a href="{{ cancelar_url }}" class="btn-cancelar">
            Cancelar cita
        </a>

        <a href="/" class="volver">Volver al inicio</a>
    </div>
</body>
</html>
