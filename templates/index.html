<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbería Junior</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0f0f10; color: white; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1b1b1c; padding: 25px; border-radius: 20px; }
        h1 { color: #D4AF37; text-align: center; }
        label { display: block; margin-top: 15px; margin-bottom: 8px; color: #D4AF37; font-weight: bold; }
        input, select, button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #242425;
            color: white;
            font-size: 16px;
        }
        button {
            background: #D4AF37;
            color: black;
            font-weight: bold;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }
        .flash {
            background: #D4AF37;
            color: black;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Agendar cita</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/guardar" method="POST">
        <label>Nombre</label>
        <input type="text" name="cliente" required>

        <label>WhatsApp</label>
        <input type="tel" name="telefono_cliente" required pattern="[0-9]{8}" maxlength="8">

        <label>Barbero</label>
        <select name="barbero_id" id="barbero_id" required onchange="actualizarHoras()">
            <option value="">Selecciona un barbero</option>
            {% for b in barberos %}
            <option value="{{ b.id }}">{{ b.nombre }}</option>
            {% endfor %}
        </select>

        <label>Servicio</label>
        <select name="servicio" required>
            <option value="">Selecciona un servicio</option>
            {% for nombre, precio in servicios.items() %}
            <option value="{{ nombre }}">{{ nombre }} - ₡{{ precio }}</option>
            {% endfor %}
        </select>

        <label>Fecha</label>
        <input type="date" id="fecha" name="fecha" min="{{ hoy_iso }}" value="{{ hoy_iso }}" onchange="actualizarHoras()" required>

        <label>Hora</label>
        <select name="hora" id="hora_select" required>
            <option value="">Primero elige barbero y fecha</option>
        </select>

        <button type="submit">Agendar cita</button>
    </form>
</div>

<script>
async function actualizarHoras() {
    const fecha = document.getElementById("fecha").value;
    const barberoId = document.getElementById("barbero_id").value;
    const select = document.getElementById("hora_select");

    if (!fecha || !barberoId) {
        select.innerHTML = '<option value="">Primero elige barbero y fecha</option>';
        return;
    }

    select.innerHTML = '<option value="">Cargando horas...</option>';

    try {
        const res = await fetch(`/horas?fecha=${fecha}&barbero_id=${barberoId}&t=${Date.now()}`);
        const horas = await res.json();

        if (!horas.length) {
            select.innerHTML = '<option value="">No hay horas disponibles</option>';
            return;
        }

        select.innerHTML = '<option value="">Selecciona una hora</option>';
        horas.forEach(h => {
            const opt = document.createElement("option");
            opt.value = h;
            opt.textContent = h;
            select.appendChild(opt);
        });
    } catch (e) {
        select.innerHTML = '<option value="">Error al cargar horas</option>';
    }
}
</script>
</body>
</html>
